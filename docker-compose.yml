services:
  postgres:
    image: postgres:15
    container_name: order_creation_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    command: sh -c "sh scripts/wait_for_postgres.sh && python src/manage.py migrate --noinput && python src/manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
    name: order_creation_postgres_data
